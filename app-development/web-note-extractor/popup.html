<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Note Extractor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 380px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
    }

    .container {
      padding: 20px;
      background: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 20px;
    }

    .header-text h1 {
      font-size: 18px;
      font-weight: 700;
      color: #1a1a1a;
      margin: 0;
    }

    .header-text p {
      font-size: 12px;
      color: #999;
      margin: 2px 0 0 0;
    }

    .page-info {
      background: #f5f5f5;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 12px;
      color: #666;
      border-left: 3px solid #667eea;
      word-break: break-word;
    }

    .page-info strong {
      display: block;
      color: #333;
      margin-bottom: 4px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .status {
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      text-align: center;
      display: none;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .status.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .status.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    .status.loading {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
      display: block;
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #0c5460;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .divider {
      height: 1px;
      background: #e0e0e0;
      margin: 8px 0;
    }

    .info-box {
      background: #f9f9f9;
      border-left: 3px solid #667eea;
      padding: 12px;
      border-radius: 4px;
      font-size: 12px;
      color: #666;
      line-height: 1.5;
    }

    .info-box strong {
      color: #333;
    }

    .feature-list {
      font-size: 12px;
      color: #666;
      line-height: 1.6;
    }

    .feature-list li {
      margin-left: 16px;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="icon">📄</div>
      <div class="header-text">
        <h1>Web Note Extractor</h1>
        <p>Save any webpage instantly</p>
      </div>
    </div>

    <div class="page-info">
      <strong>Current Page:</strong>
      <span id="pageTitle">Loading...</span>
    </div>

    <div id="status" class="status"></div>

    <div class="button-group">
      <button id="extractText" class="btn-primary">
        <span>📝</span> Extract as Text
      </button>
      <button id="extractPdf" class="btn-primary">
        <span>📕</span> Save as PDF
      </button>
      <button id="extractBoth" class="btn-secondary">
        <span>⚡</span> Extract Both
      </button>
    </div>

    <div class="divider"></div>

    <div class="info-box">
      <strong>✨ How it works:</strong>
      <ul class="feature-list">
        <li>Automatically scrolls to load all content</li>
        <li>Extracts clean, readable text</li>
        <li>Saves with smart filenames & dates</li>
        <li>Works on any website</li>
      </ul>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
